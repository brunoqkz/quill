name: Frontend Deploy

on:
  workflow_run:
    workflows: ["Frontend Build and Push"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-image-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Deploy example (placeholder)
        run: |
          echo "Deploying frontend image: ghcr.io/${{ github.repository }}-frontend:${{ env.IMAGE_TAG }}"

          # Here we would add our actual deployment commands
          # For example:
          # - SSH into your server
          # - Pull the image
          # - Update configuration
          # - Restart the service
